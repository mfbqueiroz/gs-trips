<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>GS Car Rental</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23F59E0B'/><text x='16' y='22' font-size='16' font-weight='800' text-anchor='middle' fill='%230a0a0a' font-family='sans-serif'>GS</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0a;font-family:'DM Sans',sans-serif;color:#E8E8E8}#root{min-height:100vh}input,select,button{font-family:inherit}::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}</style>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

const APP_PASS="gs2026",ADMIN_PASS="gsadmin",PK="#22c55e",RT="#f97316";
const si={width:"100%",boxSizing:"border-box",background:"#0C0C0C",border:"1px solid #222",borderRadius:8,padding:"9px 12px",color:"#E8E8E8",fontSize:13,fontFamily:"'DM Sans',sans-serif",outline:"none"};
const sc={background:"#111",border:"1px solid #1a1a1a",borderRadius:12};
const sb={padding:"7px 14px",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",transition:"all .15s"};
const ss={fontSize:12,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:1.5,color:"#888",marginBottom:14,display:"flex",alignItems:"center",gap:6};
const eI=(c)=>({background:"#0C0C0C",border:`1px solid ${c}40`,borderRadius:6,padding:"4px 8px",color:c,fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif",outline:"none",width:90,textAlign:"center"});
const FUEL=["","E","1/4","1/2","3/4","F"];
const MONTHS=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

function fS(d){return d?new Date(d).toLocaleDateString("pt-BR",{day:"2-digit",month:"short"}):"—";}
function fD(d){return d?new Date(d).toLocaleDateString("pt-BR",{weekday:"short",day:"2-digit",month:"short",year:"numeric"}):"—";}
function fH(d){return d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR",{weekday:"long",day:"2-digit",month:"long"}):""}
function fT(d){return d?new Date(d).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}):"";}
function isTd(d){if(!d)return false;const a=new Date(d),t=new Date();return a.getFullYear()===t.getFullYear()&&a.getMonth()===t.getMonth()&&a.getDate()===t.getDate();}
function sot(){const d=new Date();d.setHours(0,0,0,0);return d;}
function dB(a,b){return(!a||!b)?0:Math.max(1,Math.ceil((new Date(b)-new Date(a))/864e5));}
function $(v){return typeof v==="number"?`US$ ${v.toFixed(2)}`:"—";}
function dk(d){if(!d)return"";const t=new Date(d);return`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;}
function dlbl(k){if(k===dk(new Date()))return"Hoje";if(k===dk(new Date(Date.now()+864e5)))return"Amanha";return"";}

function parseExcel(data){
  const fix=(d)=>{if(!d)return"";if(d instanceof Date)return d.toISOString();const s=String(d).trim();return s.match(/^\d{4}-\d{2}-\d{2}$/)?s+"T12:00:00":s;};
  const wb=XLSX.read(data,{type:"array",cellDates:true}),ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
  let hi=-1;
  for(let i=0;i<Math.min(rows.length,15);i++){const r=rows[i];if(r&&r.map(c=>String(c||"")).join("|").match(/Reservation#|RA#/)){hi=i;break;}}
  if(hi<0)return[];
  const hd=rows[hi].map((h,i)=>(h||`c${i}`).toString().trim());
  const c=n=>hd.indexOf(n),ca=(...ns)=>{for(const n of ns){const i=hd.indexOf(n);if(i>=0)return i;}return-1;};
  const isR=c("Reservation#")>=0&&c("Vehicle ID")>=0;
  const trips=[];
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];if(!r)continue;
    const rn=r[isR?c("Reservation#"):c("RA#")];if(!rn)continue;
    const rs=String(rn);if(rs.match(/^[A-Za-z\s()]+$/)&&!rs.match(/^\d+$/))continue;
    const base={pickupMileage:"",returnMileage:"",pickupFuel:"",returnFuel:"",discount:0,oneWay:0};
    if(isR){
      const fn=(r[c("Full Name")]||"").toString().trim();
      trips.push({...base,id:rs,resNumber:rs,customerName:fn.replace(/\s{2,}/g," ").replace(/\s+(turo|\.|\d+)$/i,"").trim(),phone:r[c("Phone")]||"",vehicle:r[c("Vehicle ID")]||"",vehicleType:r[c("Vehicle Type")]||"",pickupLocation:r[ca("Loc.Out","Pickup Location")]||"",pickupDate:fix(r[c("Pickup Date")]),returnDate:fix(r[c("Return Date")]),returnLocation:r[ca("Loc.In","Return Location")]||"",status:r[c("Status")]||"",days:r[c("#days")]||0,channel:r[c("Reservation Channel")]||"",reservedBy:r[c("Reserved By")]||"",total:r[c("Total")]||0,paid:r[c("Paid")]||0,balance:r[c("Balance")]||0,email:"",customerId:""});
    }else{
      trips.push({...base,id:rs,resNumber:r[ca("Res#","Reservation#")]||rs,customerId:r[c("Customer ID")]||"",customerName:`${r[c("First Name")]||""} ${r[c("Last Name")]||""}`.trim(),phone:r[c("Customer Phone")]||"",email:r[c("Customer Email")]||"",vehicle:r[c("Vehicle")]||"",vehicleType:r[c("Vehicle Type")]||"",pickupLocation:r[c("Pickup Location")]||"",pickupDate:fix(r[c("Pickup Date")]),returnDate:fix(r[c("Return Date")]),returnLocation:r[c("Return Location")]||"",status:r[c("Status")]||"",days:r[c("Days")]||0,discount:r[c("Discount")]||0,oneWay:r[c("One Way")]||0,total:r[c("Total")]||0,paid:r[c("Paid")]||0,balance:r[c("Balance")]||0,channel:"",reservedBy:""});
    }
  }
  return trips;
}

const STC={Open:{l:"Ativa",c:"#22c55e"},Confirmed:{l:"Confirmada",c:"#3b82f6"},Honored:{l:"Honorada",c:"#8b5cf6"},Closed:{l:"Concluida",c:"#6b7280"},Cancelled:{l:"Cancelada",c:"#ef4444"}};
function SB({status}){const s=STC[status]||{l:status,c:"#555"};return <span style={{fontSize:9,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:s.c,background:`${s.c}18`,padding:"2px 8px",borderRadius:999,border:`1px solid ${s.c}30`}}>{s.l}</span>;}
function DR({l,v,hl}){return <div style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:11,color:"#555"}}>{l}</span><span style={{fontSize:12,color:hl?"#F59E0B":"#CCC",fontWeight:hl?700:500,textAlign:"right",maxWidth:"65%"}}>{v}</span></div>;}
function MS({l,v,sm}){return <div style={{background:"#0C0C0C",borderRadius:8,padding:"8px 10px",textAlign:"center"}}><div style={{fontSize:sm?11:16,fontWeight:700,color:"#E8E8E8",fontFamily:"'Barlow Condensed',sans-serif"}}>{v}</div><div style={{fontSize:9,color:"#555",textTransform:"uppercase"}}>{l}</div></div>;}
function StC({l,v,c}){return <div style={{background:"#111",borderRadius:10,border:"1px solid #1a1a1a",padding:"10px 12px",textAlign:"center"}}><div style={{fontSize:18,fontWeight:700,color:c,fontFamily:"'Barlow Condensed',sans-serif"}}>{v}</div><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:.5}}>{l}</div></div>;}
function ER2({l,v,c,fn}){return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:11,color:"#555"}}>{l}</span><div style={{display:"flex",alignItems:"center",gap:4}}><span style={{fontSize:11,color:"#555"}}>US$</span><input type="number" step="0.01" value={v} onChange={e=>fn(e.target.value)} style={{...eI(c),width:100,textAlign:"right"}}/></div></div>;}
function FG({level}){const idx=FUEL.indexOf(level);const pct=idx>0?idx*25:0;return <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:50,height:8,background:"#222",borderRadius:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:pct<=25?"#ef4444":pct<=50?"#F59E0B":"#22c55e",borderRadius:4}}/></div><span style={{fontSize:11,color:"#CCC"}}>{level||"—"}</span></div>;}

function EC({ev,onSelect,admin}){
  const{type,trip,time}=ev,isP=type==="pickup",cl=isP?PK:RT,lb=isP?"SAIDA":"RETORNO";
  const loc=isP?trip.pickupLocation:trip.returnLocation,od=isP?trip.returnDate:trip.pickupDate;
  const days=trip.days||dB(trip.pickupDate,trip.returnDate);
  return (
    <div onClick={onSelect} style={{...sc,overflow:"hidden",cursor:"pointer",transition:"all .15s",borderLeft:`3px solid ${cl}`}} onMouseEnter={e=>e.currentTarget.style.background="#131313"} onMouseLeave={e=>e.currentTarget.style.background="#111"}>
      <div style={{display:"flex",gap:10,padding:"10px 12px"}}>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:48}}>
          <div style={{fontSize:16,marginBottom:1}}>{isP?"🟢":"🟠"}</div>
          <div style={{fontSize:8,fontWeight:700,color:cl,letterSpacing:.5}}>{lb}</div>
          {time&&<div style={{fontSize:11,fontWeight:600,color:"#E8E8E8",marginTop:1}}>{time}</div>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3,flexWrap:"wrap"}}>
            <SB status={trip.status}/><span style={{fontSize:9,color:"#444",fontFamily:"monospace"}}>#{trip.id}</span>
            {admin&&trip.balance>0&&<span style={{fontSize:8,fontWeight:700,color:"#ef4444",background:"rgba(239,68,68,.1)",padding:"1px 6px",borderRadius:999}}>Saldo ${trip.balance.toFixed(0)}</span>}
            {(trip.pickupLocation||"").includes("Turo")&&<span style={{fontSize:8,fontWeight:700,color:"#a78bfa",background:"rgba(139,92,246,.1)",padding:"1px 6px",borderRadius:999}}>Turo</span>}
          </div>
          <div style={{fontSize:12,fontWeight:600,color:"#E8E8E8",marginBottom:1}}>{trip.customerName}</div>
          <div style={{fontSize:12,fontWeight:700,color:"#F5F5F5",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>{trip.vehicle}</div>
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#888",flexWrap:"wrap"}}>
            <span style={{color:cl}}>{loc}</span><span style={{color:"#333"}}>·</span><span style={{color:"#555"}}>{days}d</span><span style={{color:"#333"}}>·</span><span style={{color:"#555"}}>{isP?"ret":"saiu"} {fS(od)}</span>
          </div>
        </div>
        {admin&&<div style={{flexShrink:0,textAlign:"right",display:"flex",alignItems:"center"}}><div style={{fontSize:14,fontWeight:700,color:"#F59E0B",fontFamily:"'Barlow Condensed',sans-serif"}}>{$(trip.total)}</div></div>}
      </div>
    </div>
  );
}

function App(){
  const[locked,setLocked]=useState(true);
  const[appPw,setAppPw]=useState("");
  const[trips,setTrips]=useState([]);
  const[filter,setFilter]=useState("today_future");
  const[search,setSearch]=useState("");
  const[dateFrom,setDateFrom]=useState("");
  const[dateTo,setDateTo]=useState("");
  const[sel,setSel]=useState(null);
  const[tab,setTab]=useState("agenda");
  const[toast,setToast]=useState(null);
  const[fn,setFn]=useState(null);
  const[etf,setEtf]=useState("all");
  const[ed,setEd]=useState(null);
  const[admin,setAdmin]=useState(false);
  const[showAdminPw,setShowAdminPw]=useState(false);
  const[adminPw,setAdminPw]=useState("");
  const[calMonth,setCalMonth]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;});
  const[hiddenCars,setHiddenCars]=useState([]);
  const[finYear,setFinYear]=useState(new Date().getFullYear());
  const[finMonth,setFinMonth]=useState(0); // 0 = all
  const[syncing,setSyncing]=useState(false);
  const[syncId,setSyncId]=useState("");
  const[showSync,setShowSync]=useState(false);
  const[loadId,setLoadId]=useState("");
  const fr=useRef(null);
  const t2=(m,t="success")=>{setToast({m,t});setTimeout(()=>setToast(null),3500);};

  const save=useCallback(async(t,f,hc)=>{
    const data={trips:t||trips,fileName:f||fn,hiddenCars:hc||hiddenCars};
    try{localStorage.setItem("gs-v4", JSON.stringify(data));}catch{try{localStorage.setItem("gs-v4",JSON.stringify(data));}catch{}}
  },[trips,fn,hiddenCars]);

  useEffect(()=>{
    (async()=>{try{
      let d=null;
      try{const r=(() => { const v = localStorage.getItem("gs-v4"); return v ? { value: v } : null; })();if(r?.value)d=JSON.parse(r.value);}catch{}
      if(!d)try{const v=localStorage.getItem("gs-v4");if(v)d=JSON.parse(v);}catch{}
      if(d){if(d.trips)setTrips(d.trips);if(d.fileName)setFn(d.fileName);if(d.hiddenCars)setHiddenCars(d.hiddenCars);}
      try{const sid=localStorage.getItem("gs-sync-id");if(sid)setSyncId(sid);}catch{}
    }catch{}})();
  },[]);

  // Upload & merge
  const hu=(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=(ev)=>{try{
      const parsed=parseExcel(new Uint8Array(ev.target.result));
      if(!parsed.length){t2("Nenhuma reserva","error");return;}
      const existing=new Map(trips.map(t=>[t.id,t]));
      const merged=[];const seen=new Set();
      for(const p of parsed){seen.add(p.id);const old=existing.get(p.id);
        if(old){merged.push({...p,pickupMileage:old.pickupMileage||"",returnMileage:old.returnMileage||"",pickupFuel:old.pickupFuel||"",returnFuel:old.returnFuel||""});}
        else{merged.push(p);}}
      for(const t of trips){if(!seen.has(t.id))merged.push(t);}
      merged.sort((a,b)=>new Date(a.pickupDate)-new Date(b.pickupDate));
      setTrips(merged);setFn(f.name);save(merged,f.name,hiddenCars);
      t2(`${parsed.length} processadas · ${merged.length} total`);
    }catch(e){t2("Erro: "+e.message,"error");}};
    rd.readAsArrayBuffer(f);
  };

  const startEdit=(t)=>{setEd({pt:(fT(t.pickupDate)||"10:00").replace(/[^\d:]/g,""),rt:(fT(t.returnDate)||"10:00").replace(/[^\d:]/g,""),pm:t.pickupMileage||"",rm:t.returnMileage||"",pf:t.pickupFuel||"",rf:t.returnFuel||"",total:t.total||0,paid:t.paid||0,balance:t.balance||0,discount:t.discount||0});};
  const saveEdit=()=>{
    if(!sel||!ed)return;
    const ud=(ds,nt)=>{if(!ds||!nt)return ds;const d=new Date(ds);const[h,m]=nt.split(":").map(Number);if(isNaN(h)||isNaN(m))return ds;d.setHours(h,m,0,0);return d.toISOString();};
    const ut={...sel,pickupDate:ud(sel.pickupDate,ed.pt),returnDate:ud(sel.returnDate,ed.rt),pickupMileage:ed.pm,returnMileage:ed.rm,pickupFuel:ed.pf,returnFuel:ed.rf,total:Number(ed.total)||0,paid:Number(ed.paid)||0,balance:Number(ed.balance)||0,discount:Number(ed.discount)||0};
    const up=trips.map(t=>t.id===sel.id?ut:t);setTrips(up);setSel(ut);save(up,fn,hiddenCars);setEd(null);t2("Salvo!");
  };

  // Cloud sync
  const cloudSave=async()=>{
    setSyncing(true);
    try{
      const payload={trips,fileName:fn,hiddenCars,updated:new Date().toISOString()};
      if(syncId){
        await fetch(`https://api.npoint.io/${syncId}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        t2("Atualizado na nuvem!");
      }else{
        const r=await fetch("https://api.npoint.io/",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
        if(!r.ok)throw new Error("Erro ao criar");
        const url=r.headers.get("location")||"";
        // npoint returns the full URL, extract ID
        let id="";
        try{const d=await r.json();id=d?.id||"";}catch{}
        if(!id&&url)id=url.split("/").pop();
        if(!id){
          // Try getting from response URL
          const text=await r.text();
          const m=text.match(/"id"\s*:\s*"([^"]+)"/);
          if(m)id=m[1];
        }
        if(id){setSyncId(id);try{localStorage.setItem("gs-sync-id",id);}catch{}t2("Salvo! ID: "+id);}
        else t2("Salvo mas nao obteve ID","warn");
      }
    }catch(e){t2("Erro: "+e.message,"error");}
    setSyncing(false);
  };

  const cloudLoad=async(id)=>{
    if(!id)return;setSyncing(true);
    try{
      const r=await fetch(`https://api.npoint.io/${id}`);
      const d=await r.json();
      if(d.trips){setTrips(d.trips);setFn(d.fileName||"Nuvem");if(d.hiddenCars)setHiddenCars(d.hiddenCars);
        save(d.trips,d.fileName||"Nuvem",d.hiddenCars||[]);
        setSyncId(id);try{localStorage.setItem("gs-sync-id",id);}catch{}
        t2(`Carregado: ${d.trips.length} reservas`);}
      else t2("Dados invalidos","error");
    }catch(e){t2("Erro: "+e.message,"error");}
    setSyncing(false);
  };

  const toggleHideCar=(name)=>{
    const next=hiddenCars.includes(name)?hiddenCars.filter(c=>c!==name):[...hiddenCars,name];
    setHiddenCars(next);save(trips,fn,next);
  };

  // EVENTS
  const events=useMemo(()=>{
    const e=[];for(const t of trips){if(t.status==="Cancelled")continue;
    e.push({type:"pickup",dk:dk(t.pickupDate),time:fT(t.pickupDate),trip:t,sd:new Date(t.pickupDate)});
    e.push({type:"return",dk:dk(t.returnDate),time:fT(t.returnDate),trip:t,sd:new Date(t.returnDate)});}
    e.sort((a,b)=>a.sd-b.sd||(a.type==="pickup"?-1:1));return e;
  },[trips]);

  const today=sot(),tdk=dk(new Date()),tmdk=dk(new Date(Date.now()+864e5));
  const hasDateRange=dateFrom||dateTo;

  const fe=useMemo(()=>events.filter(ev=>{
    if(dateFrom&&ev.sd<new Date(dateFrom+"T00:00:00"))return false;
    if(dateTo&&ev.sd>new Date(dateTo+"T23:59:59"))return false;
    if(!hasDateRange){
      if(filter==="today_future"&&ev.sd<today)return false;
      if(filter==="today"&&ev.dk!==tdk)return false;
      if(filter==="tomorrow"&&ev.dk!==tmdk)return false;
      if(filter==="week"){const w=new Date(Date.now()+7*864e5);if(ev.sd<today||ev.sd>w)return false;}}
    if(etf==="pickup"&&ev.type!=="pickup")return false;
    if(etf==="return"&&ev.type!=="return")return false;
    const q=search.toLowerCase();
    if(q&&![ev.trip.customerName,ev.trip.vehicle,ev.trip.vehicleType,ev.trip.pickupLocation,ev.trip.returnLocation,ev.trip.id,ev.trip.phone].some(s=>(s||"").toLowerCase().includes(q)))return false;
    return true;
  }),[events,filter,etf,search,today,tdk,tmdk,dateFrom,dateTo,hasDateRange]);

  const gbd=useMemo(()=>{const g=[];let ck=null,cg=null;for(const ev of fe){if(ev.dk!==ck){ck=ev.dk;cg={dk:ck,evs:[]};g.push(cg);}cg.evs.push(ev);}return g;},[fe]);
  const te=events.filter(e=>e.dk===tdk);
  const cts={tf:events.filter(e=>e.sd>=today).length,td:te.length,tm:events.filter(e=>e.dk===tmdk).length,wk:events.filter(e=>e.sd>=today&&e.sd<=new Date(Date.now()+7*864e5)).length,all:events.length};

  // FINANCEIRO ANUAL
  const finData=useMemo(()=>{
    const active=trips.filter(t=>t.status!=="Cancelled");
    const yearly=active.filter(t=>{const y=new Date(t.pickupDate).getFullYear();return y===finYear;});
    const monthly=finMonth>0?yearly.filter(t=>new Date(t.pickupDate).getMonth()+1===finMonth):yearly;
    const byMonth=Array.from({length:12},(_,i)=>{
      const m=yearly.filter(t=>new Date(t.pickupDate).getMonth()===i);
      return{month:MONTHS[i],total:m.reduce((s,t)=>s+(t.total||0),0),paid:m.reduce((s,t)=>s+(t.paid||0),0),balance:m.reduce((s,t)=>s+(t.balance||0),0),count:m.length};
    });
    return{
      all:{total:monthly.reduce((s,t)=>s+(t.total||0),0),paid:monthly.reduce((s,t)=>s+(t.paid||0),0),balance:monthly.reduce((s,t)=>s+(t.balance||0),0),count:monthly.length},
      byMonth,yearly:{total:yearly.reduce((s,t)=>s+(t.total||0),0),paid:yearly.reduce((s,t)=>s+(t.paid||0),0)},
      pendingTrips:monthly.filter(t=>t.balance>0).sort((a,b)=>(b.balance||0)-(a.balance||0)),
      paidTrips:monthly.filter(t=>t.paid>0).sort((a,b)=>new Date(b.pickupDate)-new Date(a.pickupDate)),
      years:[...new Set(active.map(t=>new Date(t.pickupDate).getFullYear()))].sort((a,b)=>b-a)
    };
  },[trips,finYear,finMonth]);

  // FROTA
  const vehicles=useMemo(()=>{
    const map=new Map();
    for(const t of trips){if(t.status==="Cancelled")continue;

      map.get(key).bookings.push({id:t.id,customer:t.customerName,start:t.pickupDate,end:t.returnDate,status:t.status});}
    return Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name));
  },[trips]);

  const visibleVehicles=vehicles.filter(v=>!hiddenCars.includes(v.name));
  const hiddenVehicles=vehicles.filter(v=>hiddenCars.includes(v.name));

  const calDays=useMemo(()=>{
    const[y,m]=calMonth.split("-").map(Number);
    const dim=new Date(y,m,0).getDate();
    return Array.from({length:dim},(_,i)=>{const d=new Date(y,m-1,i+1);return{date:d,key:dk(d),day:i+1,dow:d.toLocaleDateString("pt-BR",{weekday:"narrow"})};});
  },[calMonth]);

  const s=sel;

  // ══════ PASSWORD GATE ══════
  if(locked){
    return (
      <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Sans',sans-serif",color:"#E8E8E8",display:"flex",alignItems:"center",justifyContent:"center"}}>

          <div style={{width:50,height:50,borderRadius:12,background:"linear-gradient(135deg,#F59E0B,#D97706)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:20,color:"#0C0C0C",fontFamily:"'Barlow Condensed',sans-serif",margin:"0 auto 16px"}}>GS</div>

          <div style={{fontSize:11,color:"#555",marginBottom:20}}>Agenda de reservas</div>
          <input type="password" value={appPw} onChange={e=>setAppPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(appPw===APP_PASS||appPw===ADMIN_PASS){setLocked(false);if(appPw===ADMIN_PASS)setAdmin(true);setAppPw("");}else{t2("Senha incorreta","error");setAppPw("");}}}} placeholder="Senha" style={{...si,textAlign:"center",marginBottom:12}}/>
          <button onClick={()=>{if(appPw===APP_PASS||appPw===ADMIN_PASS){setLocked(false);if(appPw===ADMIN_PASS)setAdmin(true);setAppPw("");}else{t2("Senha incorreta","error");setAppPw("");}}} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0C0C0C",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:1}}>Entrar</button>
          {/* Load from cloud */}
          <div style={{marginTop:20,borderTop:"1px solid #222",paddingTop:16}}>
            <div style={{fontSize:10,color:"#555",marginBottom:8}}>Carregar dados da nuvem</div>
            <div style={{display:"flex",gap:6}}>
              <input value={loadId} onChange={e=>setLoadId(e.target.value)} placeholder="ID da nuvem" style={{...si,fontSize:11,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&loadId){cloudLoad(loadId);setLocked(false);}}}/>
              <button onClick={()=>{if(loadId){cloudLoad(loadId);setLocked(false);}}} style={{...sb,background:"rgba(59,130,246,.15)",color:"#3b82f6",border:"1px solid rgba(59,130,246,.3)",whiteSpace:"nowrap"}}>Carregar</button>
            </div>
          </div>
        </div>
        {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,background:"#7f1d1d",color:"#fca5a5"}}>{toast.m}</div>}
      </div>
    );
  }

  // ══════ MAIN APP ══════
  return (
    <div style={{minHeight:"100vh",background:"#0a0a0a",fontFamily:"'DM Sans',sans-serif",color:"#E8E8E8"}}>
      {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:999,padding:"10px 18px",borderRadius:10,fontSize:13,fontWeight:600,background:toast.t==="error"?"#7f1d1d":toast.t==="warn"?"#78350f":"#14532d",color:toast.t==="error"?"#fca5a5":toast.t==="warn"?"#fde68a":"#86efac"}}>{toast.m}</div>}

      {showAdminPw&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>setShowAdminPw(false)}>

          <input type="password" value={adminPw} onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"){if(adminPw===ADMIN_PASS){setAdmin(true);setShowAdminPw(false);setAdminPw("");t2("Admin ativado");}else{t2("Incorreta","error");setAdminPw("");}}}} placeholder="Senha admin" style={{...si,marginBottom:12}} autoFocus/>
          <button onClick={()=>{if(adminPw===ADMIN_PASS){setAdmin(true);setShowAdminPw(false);setAdminPw("");t2("Admin ativado");}else{t2("Incorreta","error");setAdminPw("");}}} style={{width:"100%",padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#0C0C0C",fontSize:13,fontWeight:700,cursor:"pointer"}}>Entrar</button>

          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#F59E0B,#D97706)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:"#0C0C0C",fontFamily:"'Barlow Condensed',sans-serif"}}>GS</div>
            <span style={{fontSize:12,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",textTransform:"uppercase",letterSpacing:1.5}}>GS Rental</span>

        </div>
      </header>

      {/* SYNC BAR */}
      {showSync&&<div style={{background:"#0C0C0C",borderBottom:"1px solid #1a1a1a",padding:"10px 12px"}}>

          <button onClick={cloudSave} disabled={syncing||!trips.length} style={{...sb,fontSize:10,padding:"4px 10px",background:"rgba(34,197,94,.12)",color:"#22c55e",border:"1px solid rgba(34,197,94,.3)"}}>{syncing?"...":"Salvar"}</button>
          <input value={loadId} onChange={e=>setLoadId(e.target.value)} placeholder="ID para carregar" style={{...si,fontSize:10,padding:"4px 8px",width:140}}/>
          <button onClick={()=>cloudLoad(loadId)} disabled={syncing||!loadId} style={{...sb,fontSize:10,padding:"4px 10px",background:"rgba(59,130,246,.12)",color:"#3b82f6",border:"1px solid rgba(59,130,246,.3)"}}>{syncing?"...":"Carregar"}</button>
        </div>
      </div>}

      <div style={{maxWidth:1100,margin:"0 auto",padding:"12px 12px 60px"}}>

        {/* ════ AGENDA ════ */}

            <StC l="Retornos hoje" v={events.filter(e=>e.dk===tdk&&e.type==="return").length} c={RT}/>

            {admin&&<StC l="Receita" v={`$${Math.round(finData.yearly.total).toLocaleString()}`} c="#a78bfa"/>}

          <div style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>

            <span style={{fontSize:9,color:"#555"}}>Ate:</span>

          </div>

          {!hasDateRange&&<div style={{display:"flex",gap:3,marginBottom:6,overflowX:"auto"}}>

              <button key={k} onClick={()=>setFilter(k)} style={{padding:"3px 8px",borderRadius:999,fontSize:10,fontWeight:600,cursor:"pointer",border:filter===k?"1px solid rgba(245,158,11,.4)":"1px solid #1a1a1a",background:filter===k?"rgba(245,158,11,.1)":"transparent",color:filter===k?"#F59E0B":"#555",whiteSpace:"nowrap"}}>{l}({n})</button>
            )}
          </div>}
          <div style={{display:"flex",gap:3,marginBottom:8}}>
            {[["all","Todos"],["pickup","🟢Saidas"],["return","🟠Retornos"]].map(([k,l])=>{const c=k==="pickup"?PK:k==="return"?RT:"#888";
              return <button key={k} onClick={()=>setEtf(k)} style={{padding:"3px 8px",borderRadius:999,fontSize:10,fontWeight:600,cursor:"pointer",border:etf===k?`1px solid ${c}60`:"1px solid #1a1a1a",background:etf===k?`${c}15`:"transparent",color:etf===k?c:"#555"}}>{l}</button>;})}
          </div>
          <input style={{...si,marginBottom:10,background:"#111",borderRadius:10,fontSize:11}} placeholder="Buscar cliente, veiculo, local..." value={search} onChange={e=>setSearch(e.target.value)}/>

          {trips.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#444"}}><div style={{fontSize:32,marginBottom:8,opacity:.4}}>📊</div><div style={{fontSize:13}}>Importe o relatorio Excel</div>
            <button onClick={()=>fr.current?.click()} style={{...sb,background:"rgba(139,92,246,.15)",color:"#a78bfa",border:"1px solid rgba(139,92,246,.3)",padding:"8px 20px",marginTop:10}}>Upload</button></div>}

          {gbd.map(g=>{const dl=dlbl(g.dk),ic=g.dk===tdk,pk=g.evs.filter(e=>e.type==="pickup").length,rt=g.evs.filter(e=>e.type==="return").length;
            return <div key={g.dk} style={{marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,padding:"5px 0",borderBottom:ic?"2px solid #F59E0B":"1px solid #222"}}>
                <div style={{fontSize:14,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",color:ic?"#F59E0B":"#E8E8E8",textTransform:"capitalize"}}>{dl&&<span>{dl} — </span>}{fH(g.dk)}</div>
                <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
                  {pk>0&&<span style={{fontSize:9,color:PK,background:`${PK}15`,padding:"1px 6px",borderRadius:999}}>🟢{pk}</span>}
                  {rt>0&&<span style={{fontSize:9,color:RT,background:`${RT}15`,padding:"1px 6px",borderRadius:999}}>🟠{rt}</span>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5}}>{g.evs.map((ev,i)=> <EC key={`${ev.trip.id}-${ev.type}-${i}`} ev={ev} admin={admin} onSelect={()=>{setSel(ev.trip);setEd(null);}}/>)}</div>
            </div>;
          })}
        </>}

        {/* ════ DETAIL ════ */}
        {tab==="agenda"&&s&&<>
          <button onClick={()=>{setSel(null);setEd(null);}} style={{background:"none",border:"none",color:"#F59E0B",fontSize:11,fontWeight:600,cursor:"pointer",padding:0,marginBottom:10}}>← Voltar</button>
          <div style={{...sc,padding:16,marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div><div style={{display:"flex",gap:6,marginBottom:3}}><span style={{fontSize:10,fontWeight:700,color:"#F59E0B"}}>#{s.id}</span><SB status={s.status}/></div>
                <div style={{fontSize:17,fontWeight:700,color:"#F5F5F5",fontFamily:"'Barlow Condensed',sans-serif"}}>{s.vehicle}</div>
                <div style={{fontSize:10,color:"#888"}}>{s.vehicleType}</div></div>
              {admin&&<div style={{textAlign:"right"}}><div style={{fontSize:22,fontWeight:800,color:"#F59E0B",fontFamily:"'Barlow Condensed',sans-serif"}}>{$(s.total)}</div>{s.balance>0&&<div style={{fontSize:10,color:"#ef4444"}}>Saldo: {$(s.balance)}</div>}</div>}
            </div>
          </div>
          <div style={{...sc,padding:12,marginBottom:8}}><div style={ss}>👤 Cliente</div><DR l="Nome" v={s.customerName}/>{s.phone&&<DR l="Tel" v={s.phone}/>}{s.email&&<DR l="Email" v={s.email}/>}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}}>
            <div style={{...sc,padding:12,borderColor:`${PK}30`}}>
              <div style={{...ss,color:PK}}>🟢 Saida</div><DR l="Local" v={s.pickupLocation}/><DR l="Data" v={fD(s.pickupDate)}/>
              {ed?<>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Hora</span><input type="time" value={ed.pt} onChange={e=>setEd({...ed,pt:e.target.value})} style={eI(PK)}/></div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Milhas</span><input type="number" placeholder="0" value={ed.pm} onChange={e=>setEd({...ed,pm:e.target.value})} style={eI(PK)}/></div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Comb</span><select value={ed.pf} onChange={e=>setEd({...ed,pf:e.target.value})} style={{...eI(PK),width:65}}>{FUEL.map(f=> <option key={f} value={f}>{f||"—"}</option>)}</select></div>
              </>:<><DR l="Hora" v={fT(s.pickupDate)}/><DR l="Milhas" v={s.pickupMileage||"—"}/><DR l="Comb" v={s.pickupFuel? <FG level={s.pickupFuel}/>:"—"}/></>}
            </div>
            <div style={{...sc,padding:12,borderColor:`${RT}30`}}>
              <div style={{...ss,color:RT}}>🟠 Retorno</div><DR l="Local" v={s.returnLocation}/><DR l="Data" v={fD(s.returnDate)}/>
              {ed?<>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Hora</span><input type="time" value={ed.rt} onChange={e=>setEd({...ed,rt:e.target.value})} style={eI(RT)}/></div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Milhas</span><input type="number" placeholder="0" value={ed.rm} onChange={e=>setEd({...ed,rm:e.target.value})} style={eI(RT)}/></div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:"1px solid #1A1A1A"}}><span style={{fontSize:10,color:"#555"}}>Comb</span><select value={ed.rf} onChange={e=>setEd({...ed,rf:e.target.value})} style={{...eI(RT),width:65}}>{FUEL.map(f=> <option key={f} value={f}>{f||"—"}</option>)}</select></div>

              </div>
              <div style={{height:8,background:"#1a1a1a",borderRadius:4,overflow:"hidden"}}>
                <div style={{height:"100%",background:"linear-gradient(90deg,#22c55e,#16a34a)",borderRadius:4,width:`${finData.all.total>0?finData.all.paid/finData.all.total*100:0}%`,transition:"width .5s"}}/>
              </div>
            </div>

            {/* Monthly chart */}
            {finMonth===0&&<div style={{...sc,padding:14,marginBottom:14}}>
              <div style={ss}>📊 Faturamento mensal {finYear}</div>
              <div style={{display:"flex",alignItems:"flex-end",gap:4,height:120}}>
                {finData.byMonth.map((m,i)=>{
                  const maxVal=Math.max(...finData.byMonth.map(x=>x.total),1);
                  const h=m.total>0?(m.total/maxVal)*100:2;
                  const isCur=i===new Date().getMonth()&&finYear===new Date().getFullYear();
                  return <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:8,color:m.total>0?"#888":"#333"}}>{m.total>0?`$${Math.round(m.total/1000)}k`:""}</div>
                    <div style={{width:"100%",height:`${h}%`,background:isCur?"#F59E0B":m.total>0?"rgba(59,130,246,.5)":"#1a1a1a",borderRadius:3,minHeight:2,transition:"height .3s"}}/>
                    <div style={{fontSize:8,color:isCur?"#F59E0B":"#555"}}>{m.month}</div>
                  </div>;
                })}
              </div>
            </div>}

            <div style={ss}>💸 A receber ({finData.pendingTrips.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:16}}>
              {finData.pendingTrips.slice(0,30).map(t=> <div key={t.id} onClick={()=>{setSel(t);setTab("agenda");}} style={{...sc,padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#131313"} onMouseLeave={e=>e.currentTarget.style.background="#111"}>
                <div><div style={{fontSize:11,fontWeight:600,color:"#E8E8E8"}}>{t.customerName}</div><div style={{fontSize:9,color:"#555"}}>#{t.id} · {t.vehicle} · {fS(t.pickupDate)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:13,fontWeight:700,color:"#ef4444",fontFamily:"'Barlow Condensed',sans-serif"}}>{$(t.balance)}</div></div>
              </div>)}
              {finData.pendingTrips.length===0&&<div style={{textAlign:"center",padding:16,color:"#444",fontSize:11}}>Nada pendente</div>}
            </div>

            <div style={ss}>✅ Recebidos ({finData.paidTrips.length})</div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              {finData.paidTrips.slice(0,30).map(t=> <div key={t.id} onClick={()=>{setSel(t);setTab("agenda");}} style={{...sc,padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#131313"} onMouseLeave={e=>e.currentTarget.style.background="#111"}>
                <div><div style={{fontSize:11,fontWeight:600,color:"#E8E8E8"}}>{t.customerName}</div><div style={{fontSize:9,color:"#555"}}>#{t.id} · {fS(t.pickupDate)}</div></div>
                <div style={{fontSize:13,fontWeight:700,color:"#22c55e",fontFamily:"'Barlow Condensed',sans-serif"}}>{$(t.paid)}</div>
              </div>)}
            </div>
          </>}
        </>}

        {/* ════ HISTORICO ════ */}
        {tab==="historico"&&<>
          <h1 style={{margin:"0 0 10px",fontSize:22,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>Historico ({trips.filter(t=>new Date(t.returnDate)<today||t.status==="Closed"||t.status==="Honoured").length})</h1>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            {trips.filter(t=>new Date(t.returnDate)<today||t.status==="Closed"||t.status==="Honored").sort((a,b)=>new Date(b.returnDate)-new Date(a.returnDate)).map(t=> <div key={t.id} onClick={()=>{setSel(t);setTab("agenda");}} style={{...sc,padding:"8px 12px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}} onMouseEnter={e=>e.currentTarget.style.background="#131313"} onMouseLeave={e=>e.currentTarget.style.background="#111"}>
              <div><div style={{display:"flex",gap:4,marginBottom:2}}><SB status={t.status}/><span style={{fontSize:9,color:"#444"}}>#{t.id}</span></div>
                <div style={{fontSize:11,fontWeight:600,color:"#E8E8E8"}}>{t.customerName}</div>
                <div style={{fontSize:10,color:"#888"}}>{t.vehicle}</div>
                <div style={{fontSize:9,color:"#555"}}>{fS(t.pickupDate)} → {fS(t.returnDate)} · {t.days||dB(t.pickupDate,t.returnDate)}d</div></div>
              {admin&&<div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:13,fontWeight:700,color:"#F59E0B",fontFamily:"'Barlow Condensed',sans-serif"}}>{$(t.total)}</div></div>}
            </div>)}
          </div>
        </>}

        {/* ════ FROTA ════ */}
        {tab==="frota"&&<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
            <h1 style={{margin:0,fontSize:22,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif"}}>Frota ({visibleVehicles.length})</h1>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <button onClick={()=>{const[y,m]=calMonth.split("-").map(Number);const d=new Date(y,m-2,1);setCalMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{...sb,padding:"3px 8px",color:"#888",border:"1px solid #222"}}>←</button>
              <span style={{fontSize:13,fontWeight:700,fontFamily:"'Barlow Condensed',sans-serif",color:"#F5F5F5",textTransform:"capitalize",minWidth:110,textAlign:"center"}}>{new Date(calMonth+"-15").toLocaleDateString("pt-BR",{month:"long",year:"numeric"})}</span>
              <button onClick={()=>{const[y,m]=calMonth.split("-").map(Number);const d=new Date(y,m,1);setCalMonth(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}} style={{...sb,padding:"3px 8px",color:"#888",border:"1px solid #222"}}>→</button>
            </div>
          </div>

          <div style={{overflowX:"auto",borderRadius:10,border:"1px solid #1a1a1a",marginBottom:12}}>
            <div style={{minWidth:Math.max(600,calDays.length*26+160)}}>
              <div style={{display:"flex",background:"#111",borderBottom:"1px solid #222",position:"sticky",top:48,zIndex:10}}>
                <div style={{minWidth:150,padding:"6px 8px",fontSize:9,fontWeight:600,color:"#888",borderRight:"1px solid #1a1a1a"}}>Veiculo</div>
                {calDays.map(d=> <div key={d.key} style={{minWidth:26,flex:1,textAlign:"center",padding:"3px 0",background:d.key===tdk?"rgba(245,158,11,.08)":"transparent"}}>
                  <div style={{fontSize:7,color:d.key===tdk?"#F59E0B":"#555"}}>{d.dow}</div>
                  <div style={{fontSize:10,fontWeight:d.key===tdk?700:400,color:d.key===tdk?"#F59E0B":"#999"}}>{d.day}</div>
                </div>)}
              </div>
              {visibleVehicles.map(v=> <div key={v.name} style={{display:"flex",borderBottom:"1px solid #0C0C0C"}}>
                <div style={{minWidth:150,padding:"4px 8px",borderRight:"1px solid #1a1a1a",display:"flex",alignItems:"center",gap:4}}>
                  <div style={{flex:1,minWidth:0}}><div style={{fontSize:10,fontWeight:600,color:"#E8E8E8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v.name}</div><div style={{fontSize:8,color:"#555"}}>{v.type}</div></div>
                  <button onClick={()=>toggleHideCar(v.name)} title="Desativar" style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#555",padding:0}}>✕</button>
                </div>
                <div style={{display:"flex",flex:1,position:"relative",minHeight:28}}>
                  {calDays.map(d=> <div key={d.key} style={{minWidth:26,flex:1,borderRight:"1px solid #080808",background:d.key===tdk?"rgba(245,158,11,.03)":"transparent"}}/>)}
                  {v.bookings.map(b=>{
                    const bS=new Date(b.start),bE=new Date(b.end),mS=calDays[0]?.date,mE=calDays[calDays.length-1]?.date;
                    if(!mS||bE<mS||bS>mE)return null;
                    const si2=Math.max(0,Math.floor((bS-mS)/864e5)),ei2=Math.min(calDays.length-1,Math.floor((bE-mS)/864e5));
                    return <div key={b.id} title={`${b.customer} #${b.id}`} style={{position:"absolute",top:3,height:22,left:`${(si2/calDays.length)*100}%`,width:`${((ei2-si2+1)/calDays.length)*100}%`,background:"linear-gradient(90deg,rgba(59,130,246,.6),rgba(59,130,246,.3))",borderRadius:3,border:"1px solid rgba(59,130,246,.4)",display:"flex",alignItems:"center",paddingLeft:3,overflow:"hidden",cursor:"pointer",zIndex:2}} onClick={()=>{const trip=trips.find(t=>t.id===b.id);if(trip){setSel(trip);setTab("agenda");}}}>
                      <span style={{fontSize:7,color:"#fff",fontWeight:600,whiteSpace:"nowrap"}}>{b.customer}</span>
                    </div>;
                  })}
                </div>
              </div>)}
            </div>
          </div>

          {/* Hidden cars */}
          {hiddenCars.length>0&&<div style={{...sc,padding:12}}>
            <div style={{fontSize:10,fontWeight:600,color:"#666",marginBottom:6}}>Veiculos desativados ({hiddenCars.length})</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {hiddenCars.map(c=> <div key={c} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 8px",borderRadius:999,background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.15)",fontSize:10,color:"#888"}}>
                <span style={{maxWidth:150,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c}</span>
                <button onClick={()=>toggleHideCar(c)} style={{background:"none",border:"none",cursor:"pointer",fontSize:10,color:"#22c55e",padding:0}}>↩</button>
              </div>)}
            </div>
          </div>}
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script></body></html>
